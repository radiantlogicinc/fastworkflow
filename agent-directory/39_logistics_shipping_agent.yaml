name: logistics_shipping_agent
type: domain_agent
category: specialized_domain
description: >
  Manages shipping and logistics operations including rate calculation,
  label generation, tracking, and carrier integration.

capabilities:
  - Shipping rate calculation
  - Label generation
  - Shipment tracking
  - Carrier API integration
  - Address validation
  - Return handling

use_cases:
  - E-commerce fulfillment
  - Warehouse management
  - Shipping automation

required_tools:
  - fastworkflow.CommandExecutor
  - Carrier APIs (UPS, FedEx, USPS)
  - Address validation service

dependencies:
  - rest_api_agent
  - notification_agent
  - database_connector_agent

example_workflow: examples/logistics_shipping_workflow

metadata:
  complexity: medium
  domain: logistics
  integration_level: moderate
  tags:
    - logistics
    - shipping
    - fulfillment
