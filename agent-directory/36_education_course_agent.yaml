name: education_course_agent
type: domain_agent
category: specialized_domain
description: >
  Manages educational courses including enrollment, content delivery,
  assessments, and progress tracking. Supports LMS integration.

capabilities:
  - Course creation and management
  - Student enrollment
  - Content delivery and scheduling
  - Assessment and grading
  - Progress tracking
  - Certificate generation

use_cases:
  - Learning management systems
  - Online course platforms
  - Training program automation

required_tools:
  - fastworkflow.CommandExecutor
  - LMS integration
  - Content management

dependencies:
  - database_connector_agent
  - notification_agent
  - file_manager_agent

example_workflow: examples/education_course_workflow

metadata:
  complexity: medium
  domain: education
  integration_level: moderate
  tags:
    - education
    - lms
    - courses
