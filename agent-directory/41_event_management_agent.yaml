name: event_management_agent
type: domain_agent
category: specialized_domain
description: >
  Manages event planning and execution including registration, ticketing,
  attendee management, and post-event follow-up.

capabilities:
  - Event creation and setup
  - Ticketing and registration
  - Attendee management
  - Email campaigns
  - Check-in management
  - Post-event surveys

use_cases:
  - Conference management
  - Event ticketing platforms
  - Webinar coordination

required_tools:
  - fastworkflow.CommandExecutor
  - Payment processing
  - Email marketing

dependencies:
  - stripe_payment_agent
  - email_integration_agent
  - notification_agent

example_workflow: examples/event_management_workflow

metadata:
  complexity: medium
  domain: events
  integration_level: moderate
  tags:
    - events
    - ticketing
    - conferences
