name: hr_recruitment_agent
type: domain_agent
category: specialized_domain
description: >
  Manages recruitment process from job posting to offer acceptance.
  Includes applicant tracking, screening, and interview coordination.

capabilities:
  - Job posting management
  - Applicant tracking
  - Resume parsing and screening
  - Interview scheduling
  - Offer generation and tracking
  - Onboarding handoff

use_cases:
  - Applicant tracking systems
  - Recruitment automation
  - Talent acquisition workflows

required_tools:
  - fastworkflow.CommandExecutor
  - Resume parsing tools
  - Calendar integration

dependencies:
  - email_integration_agent
  - notification_agent
  - document_processing_agent

example_workflow: examples/hr_recruitment_workflow

metadata:
  complexity: medium
  domain: human_resources
  integration_level: moderate
  tags:
    - hr
    - recruitment
    - ats
