name: booking_reservation_agent
type: domain_agent
category: specialized_domain
description: >
  Manages booking and reservation systems for hotels, rentals, appointments,
  and services. Includes calendar management and payment processing.

capabilities:
  - Availability management
  - Booking creation and modification
  - Calendar synchronization
  - Payment and deposit handling
  - Cancellation and refund processing
  - Reminder notifications

use_cases:
  - Hotel reservation systems
  - Appointment scheduling
  - Rental property bookings

required_tools:
  - fastworkflow.CommandExecutor
  - Calendar integration
  - Payment processing

dependencies:
  - stripe_payment_agent
  - notification_agent
  - database_connector_agent

example_workflow: examples/booking_reservation_workflow

metadata:
  complexity: medium
  domain: hospitality
  integration_level: moderate
  tags:
    - booking
    - reservations
    - scheduling
